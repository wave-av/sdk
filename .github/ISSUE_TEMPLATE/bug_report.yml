name: Bug report
description: Report a bug
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      placeholder: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Install `@wave-av/sdk`
        2. Call `wave.pipeline.create(...)`
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: e.g., 2.0.1
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: e.g., 22.0.0
